<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Decision Literacy for Kids Logo</title>
  <desc id="desc">A compact orange decision literacy icon showing a branching decision path with clear choice nodes.</desc>

  <!-- Background badge -->
  <rect x="12" y="12" width="176" height="176" rx="42" fill="#FFF7ED"/>
  <rect x="12" y="12" width="176" height="176" rx="42" stroke="#EA580C" stroke-width="8"/>

  <!-- Central decision path stem -->
  <path d="M100 151V111" stroke="#EA580C" stroke-width="12" stroke-linecap="round"/>

  <!-- Branches -->
  <path d="M100 111
           C100 94 82 91 68 82
           C58 76 53 68 53 56"
        stroke="#EA580C" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 111
           C100 93 118 91 132 82
           C142 76 147 68 147 56"
        stroke="#EA580C" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 111V57"
        stroke="#EA580C" stroke-width="12" stroke-linecap="round"/>

  <!-- Choice nodes -->
  <circle cx="100" cy="151" r="18" fill="#EA580C"/>
  <circle cx="100" cy="111" r="19" fill="#FDBA74" stroke="#EA580C" stroke-width="7"/>
  <circle cx="53" cy="56" r="18" fill="#FFFFFF" stroke="#EA580C" stroke-width="7"/>
  <circle cx="100" cy="57" r="18" fill="#FFFFFF" stroke="#EA580C" stroke-width="7"/>
  <circle cx="147" cy="56" r="18" fill="#FFFFFF" stroke="#EA580C" stroke-width="7"/>

  <!-- Simple readable symbols inside nodes -->
  <path d="M45 56H61" stroke="#EA580C" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 48V66M91 57H109" stroke="#EA580C" stroke-width="6" stroke-linecap="round"/>
  <path d="M139 56L146 63L156 49" stroke="#EA580C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Base node thinking mark -->
  <path d="M94 147C94 140 100 137 105 141C110 145 108 152 101 154V158"
        stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="101" cy="165" r="3.5" fill="#FFFFFF"/>

  <!-- Small accent dots -->
  <circle cx="48" cy="144" r="6" fill="#FDBA74"/>
  <circle cx="152" cy="144" r="6" fill="#FDBA74"/>
</svg>
